name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # --- Lint ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: ruff check apps/api/
      - name: Format check
        run: ruff format --check apps/api/

  # --- Backend Tests ---
  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agente_derecho_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Initialize test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d agente_derecho_test -f infrastructure/sql/init.sql
      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/agente_derecho_test"
          DATABASE_URL_SYNC: "postgresql://postgres:postgres@localhost:5432/agente_derecho_test"
          REDIS_URL: "redis://localhost:6379/0"
          APP_ENV: "test"
          JWT_SECRET: "test-secret-for-ci"
        run: python -m pytest tests/ -v --tb=short -x

  # --- Frontend Build ---
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit || true  # warn but don't fail
      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: npm run build

  # --- Docker Build Check ---
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t agente-derecho-api:test apps/api/
      - name: Build Web image
        run: docker build -t agente-derecho-web:test apps/web/
