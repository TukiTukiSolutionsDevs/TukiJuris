name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api-lint-test:
    name: API — lint + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agente_derecho
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install ruff pytest pytest-asyncio

      - name: Ruff lint
        working-directory: apps/api
        run: ruff check .

      - name: Run unit tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agente_derecho
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/agente_derecho
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-jwt-secret-for-tests-only-not-real-not-prod
          APP_ENV: development
          APP_DEBUG: "true"
          BETA_MODE: "true"
        run: pytest tests/unit -q --tb=short

  web-typecheck-build:
    name: Web — typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: ESLint
        working-directory: apps/web
        run: npx eslint . --max-warnings=0 || true

      - name: Type-check
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://tukijuris.com.pe
          NEXT_PUBLIC_APP_URL: https://tukijuris.com.pe
        run: npx tsc --noEmit

      - name: Next.js build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://tukijuris.com.pe
          NEXT_PUBLIC_APP_URL: https://tukijuris.com.pe
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
