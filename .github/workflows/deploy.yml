name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy notice
        run: |
          echo "Deploying to ${{ github.event.inputs.environment || 'staging' }}"
          echo "Version: ${{ github.ref_name }}"
          echo "TODO: Add actual deployment steps (Docker push, fly.io, Railway, etc.)"
          # Placeholder -- actual deployment depends on hosting choice
