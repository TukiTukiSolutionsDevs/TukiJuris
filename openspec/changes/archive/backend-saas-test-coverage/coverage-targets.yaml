# Coverage targets — backend-saas-test-coverage
#
# MUST  = CI-blocking minimum. check_coverage.py exits 1 on any violation.
# STRETCH = Warning-only. check_coverage.py prints a warning but exits 0.
#
# Thresholds anchored against Batch A baseline — Batch B tightens them.
# All values are integer percentages (0-100).

modules:
  - path: app/api/routes/auth.py
    must: 95
    stretch: 100
    spec: auth

  - path: app/api/routes/oauth.py
    must: 85
    stretch: 95
    spec: auth

  - path: app/api/routes/billing.py
    must: 85
    stretch: 95
    spec: billing

