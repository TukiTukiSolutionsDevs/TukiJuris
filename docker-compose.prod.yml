# =============================================================================
# TukiJuris — Production Docker Compose (v1.0.0-beta)
# =============================================================================
# DEPLOYMENT CHECKLIST:
#   1. Copy .env.example to .env.production and fill ALL values
#   2. Generate JWT_SECRET: python -c "import secrets; print(secrets.token_urlsafe(64))"
#   3. Set DB_PASSWORD to a strong random value
#   4. Set REDIS_PASSWORD to a strong random value
#   5. Configure OAuth (Google + Microsoft) client IDs for tukijuris.net.pe
#   6. Configure MercadoPago (MP_ACCESS_TOKEN, MP_PUBLIC_KEY)
#   7. Configure Culqi (CULQI_PUBLIC_KEY, CULQI_SECRET_KEY) — optional
#   8. Configure email (RESEND_API_KEY or SMTP) + set EMAIL_ENABLED=true
#   9. Configure Sentry (SENTRY_DSN) — optional but recommended
#  10. Set CORS_ORIGINS=["https://tukijuris.net.pe","https://www.tukijuris.net.pe"]
#  11. Set FRONTEND_URL=https://tukijuris.net.pe
#  12. Set APP_BASE_URL=https://tukijuris.net.pe
#  13. Verify SSL certs exist at /etc/letsencrypt/
#  14. Run: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    restart: always
    env_file: .env.production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg17
    restart: always
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./infrastructure/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/sql/migration_002_multi_tenant.sql:/docker-entrypoint-initdb.d/02-multi-tenant.sql
      - ./infrastructure/sql/migration_003_api_keys.sql:/docker-entrypoint-initdb.d/03-api-keys.sql
      - ./infrastructure/sql/migration_004_sso.sql:/docker-entrypoint-initdb.d/04-sso.sql
      - ./infrastructure/sql/migration_005_notifications.sql:/docker-entrypoint-initdb.d/05-notifications.sql
      - ./infrastructure/sql/migration_006_search.sql:/docker-entrypoint-initdb.d/06-search.sql
      - ./infrastructure/sql/migration_007_conversation_mgmt.sql:/docker-entrypoint-initdb.d/07-conversation-mgmt.sql
      - ./infrastructure/sql/migration_008_message_bookmarks.sql:/docker-entrypoint-initdb.d/08-message-bookmarks.sql
      - ./infrastructure/sql/migration_009_tags_folders.sql:/docker-entrypoint-initdb.d/09-tags-folders.sql
      - ./infrastructure/sql/migration_010_context_memory.sql:/docker-entrypoint-initdb.d/10-context-memory.sql
      - ./infrastructure/sql/migration_011_message_columns.sql:/docker-entrypoint-initdb.d/11-message-columns.sql
      - ./infrastructure/sql/migration_012_uploaded_documents.sql:/docker-entrypoint-initdb.d/12-uploaded-documents.sql
      - ./infrastructure/sql/migration_013_user_llm_keys.sql:/docker-entrypoint-initdb.d/13-user-llm-keys.sql
      - ./infrastructure/sql/migration_014_payment_providers.sql:/docker-entrypoint-initdb.d/14-payment-providers.sql
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-agente_derecho}
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_prod:/data
    deploy:
      resources:
        limits:
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata_prod:
  redisdata_prod:
