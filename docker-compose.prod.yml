# =============================================================================
# TukiJuris — Production Docker Compose (v1.0.0-beta)
# =============================================================================
# Uses the shared toroloco-gateway nginx as reverse proxy.
# No nginx container here — gateway handles SSL termination and routing.
# =============================================================================

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: tukijuris-api
    restart: always
    env_file: .env.production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tukijuris-internal
      - shared-gateway
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: tukijuris-web
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tukijuris-internal
      - shared-gateway
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg17
    container_name: tukijuris-db
    restart: always
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./infrastructure/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/sql/migration_002_multi_tenant.sql:/docker-entrypoint-initdb.d/02-multi-tenant.sql
      - ./infrastructure/sql/migration_003_api_keys.sql:/docker-entrypoint-initdb.d/03-api-keys.sql
      - ./infrastructure/sql/migration_004_sso.sql:/docker-entrypoint-initdb.d/04-sso.sql
      - ./infrastructure/sql/migration_005_notifications.sql:/docker-entrypoint-initdb.d/05-notifications.sql
      - ./infrastructure/sql/migration_006_search.sql:/docker-entrypoint-initdb.d/06-search.sql
      - ./infrastructure/sql/migration_007_conversation_mgmt.sql:/docker-entrypoint-initdb.d/07-conversation-mgmt.sql
      - ./infrastructure/sql/migration_008_message_bookmarks.sql:/docker-entrypoint-initdb.d/08-message-bookmarks.sql
      - ./infrastructure/sql/migration_009_tags_folders.sql:/docker-entrypoint-initdb.d/09-tags-folders.sql
      - ./infrastructure/sql/migration_010_context_memory.sql:/docker-entrypoint-initdb.d/10-context-memory.sql
      - ./infrastructure/sql/migration_011_message_columns.sql:/docker-entrypoint-initdb.d/11-message-columns.sql
      - ./infrastructure/sql/migration_012_uploaded_documents.sql:/docker-entrypoint-initdb.d/12-uploaded-documents.sql
      - ./infrastructure/sql/migration_013_user_llm_keys.sql:/docker-entrypoint-initdb.d/13-user-llm-keys.sql
      - ./infrastructure/sql/migration_014_payment_providers.sql:/docker-entrypoint-initdb.d/14-payment-providers.sql
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-agente_derecho}
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tukijuris-internal

  redis:
    image: redis:7-alpine
    container_name: tukijuris-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_prod:/data
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tukijuris-internal

volumes:
  pgdata_prod:
  redisdata_prod:

networks:
  tukijuris-internal:
    driver: bridge
  shared-gateway:
    external: true
