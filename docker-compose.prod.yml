# =============================================================================
# TukiJuris — Production Docker Compose (v1.0.0-beta)
# =============================================================================
# Uses the shared toroloco-gateway nginx as reverse proxy.
# No nginx container here — gateway handles SSL termination and routing.
#
# Run with:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d
# =============================================================================

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: tukijuris-api
    restart: always
    env_file: .env.production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - UVICORN_WORKERS=2
      - INTERNAL_API_URL=http://api:8000
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - api_uploads_prod:/app/uploads
    networks:
      - tukijuris-internal
      - shared-gateway
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        # Baked into the client bundle at build time. Override via .env.production
        # or pass `--build-arg NEXT_PUBLIC_API_URL=...` when invoking docker build.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://tukijuris.com.pe}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://tukijuris.com.pe}
    container_name: tukijuris-web
    restart: always
    environment:
      - NODE_ENV=production
      # Server-side rewrite in next.config.ts uses INTERNAL_API_URL to reach the
      # API inside the docker network. Without this Next defaults to 127.0.0.1
      # which inside the container points at the web server itself → ECONNREFUSED.
      - INTERNAL_API_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://tukijuris.com.pe}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://tukijuris.com.pe}
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tukijuris-internal
      - shared-gateway
    depends_on:
      api:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg17
    container_name: tukijuris-db
    restart: always
    env_file: .env.production
    # Only init.sql is mounted — it creates the base schema (CREATE EXTENSION + core tables).
    # Legacy migration_002..014.sql files are NOT mounted here: the Alembic migrations
    # 002..019 in apps/api/alembic/versions/ cover the same DDL and run automatically
    # via the API container's bootstrap. Keeping both produced "relation already exists"
    # errors on first boot. Bootstrap stamps `001_baseline` when alembic_version is
    # absent, then `upgrade head` applies 002..019 cleanly.
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./infrastructure/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-agente_derecho}
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tukijuris-internal

  redis:
    image: redis:7-alpine
    container_name: tukijuris-redis
    restart: always
    env_file: .env.production
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_prod:/data
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tukijuris-internal

volumes:
  pgdata_prod:
  redisdata_prod:
  api_uploads_prod:

networks:
  tukijuris-internal:
    driver: bridge
  shared-gateway:
    # Must be created on the host BEFORE first `docker compose up`:
    #   docker network create shared-gateway
    # The toroloco-gateway container is expected to be connected to this same network.
    external: true
